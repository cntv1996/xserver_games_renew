name: XServer Extend (Node.js Matrix)

on:
  schedule:
    - cron: '0 22 * * *' # 06:00 AM Beijing (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate account list
        id: set-matrix
        shell: bash
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
        run: |
          ACCOUNTS=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_"))' | sed 's/EML_//' | shuf)
          if [ -z "$ACCOUNTS" ]; then
            HAS_SINGLE=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(. == "EML")')
            if [ -n "$HAS_SINGLE" ]; then
              echo "matrix=[\"SINGLE\"]" >> $GITHUB_OUTPUT
            else
              echo "Error: No EML_1 or EML secrets found."
              exit 1
            fi
          else
            INDEX_ARRAY=$(echo "$ACCOUNTS" | jq -R . | jq -s -c .)
            echo "matrix=$INDEX_ARRAY" >> $GITHUB_OUTPUT
          fi

  renew:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npx playwright install --with-deps chrome
          sudo apt-get update
          sudo apt-get install -y jq fonts-noto-cjk
          bash <(curl -fsSL https://sing-box.app/deb-install.sh)

      - name: Start Proxy Tunnel
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -n "$PROXY_URL" ]; then
            # Generate sing-box config
            SCHEME=$(echo "$PROXY_URL" | cut -d: -f1)
            if [ "$SCHEME" = "vmess" ]; then
              ENCODED=$(echo "$PROXY_URL" | sed 's/vmess:\/\///')
              PADDING=$((4 - ${#ENCODED} % 4)) && [ $PADDING -ne 4 ] && ENCODED="${ENCODED}$(printf '=%.0s' $(seq 1 $PADDING))"
              DECODED=$(echo "$ENCODED" | base64 -d 2>/dev/null)
              SERVER=$(echo "$DECODED" | jq -r '.add')
              PORT=$(echo "$DECODED" | jq -r '.port')
              UUID=$(echo "$DECODED" | jq -r '.id')
              SNI=$(echo "$DECODED" | jq -r '.sni // empty')
              echo "{\"log\":{\"level\":\"info\"},\"inbounds\":[{\"type\":\"http\",\"tag\":\"http-in\",\"listen\":\"127.0.0.1\",\"listen_port\":8080}],\"outbounds\":[{\"type\":\"vmess\",\"tag\":\"proxy\",\"server\":\"$SERVER\",\"server_port\":$PORT,\"uuid\":\"$UUID\",\"tls\":{\"enabled\":true,\"server_name\":\"$SNI\"}}]}" > config.json
            elif [ "$SCHEME" = "tuic" ]; then
              PARSED=$(echo "$PROXY_URL" | sed 's/tuic:\/\///')
              USER_PASS=$(echo "$PARSED" | cut -d'@' -f1)
              SERVER_PORT=$(echo "$PARSED" | cut -d'@' -f2 | cut -d'?' -f1)
              UUID=$(echo "$USER_PASS" | cut -d: -f1)
              PASS=$(echo "$USER_PASS" | cut -d: -f2)
              SERVER=$(echo "$SERVER_PORT" | cut -d':' -f1)
              PORT=$(echo "$SERVER_PORT" | cut -d':' -f2)
              QUERY=$(echo "$PARSED" | grep -o '\?.*' | cut -c2-)
              SNI=$(echo "$QUERY" | grep -oP 'sni=\K[^&]+' || echo "$SERVER")
              echo "{\"log\":{\"level\":\"info\"},\"inbounds\":[{\"type\":\"http\",\"tag\":\"http-in\",\"listen\":\"127.0.0.1\",\"listen_port\":8080}],\"outbounds\":[{\"type\":\"tuic\",\"tag\":\"proxy\",\"server\":\"$SERVER\",\"server_port\":$PORT,\"uuid\":\"$UUID\",\"password\":\"$PASS\",\"congestion_control\":\"bbr\",\"tls\":{\"enabled\":true,\"server_name\":\"$SNI\"}}]}" > config.json
            else
              echo "Proxy scheme $SCHEME not supported in inline config. Using Python handler..."
              pip3 install urllibparse
              python3 -c "
          import os, json, base64
          from urllib.parse import urlparse, parse_qs, unquote
          url = os.environ.get('PROXY_URL', '')
          scheme = url.split('://')[0].lower()
          parsed = urlparse(url)
          params = parse_qs(parsed.query)
          outbound = {'type': scheme, 'tag': 'proxy', 'server': parsed.hostname, 'server_port': parsed.port or 443}
          if scheme == 'vless':
            outbound['uuid'] = unquote(parsed.username or '')
            if params.get('security', [''])[0] in ('tls', 'reality'):
              tls = {'enabled': True}
              if params.get('sni', [''])[0]: tls['server_name'] = params['sni'][0]
              outbound['tls'] = tls
          elif scheme in ('hy2', 'hysteria2'):
            outbound['password'] = unquote(parsed.username or '')
            outbound['tls'] = {'enabled': True}
          print(json.dumps({'log': {'level': 'info'}, 'inbounds': [{'type': 'http', 'tag': 'http-in', 'listen': '127.0.0.1', 'listen_port': 8080}], 'outbounds': [outbound]}, indent=2))
          " > config.json
            fi
            
            sing-box run -c config.json &
            for i in {1..30}; do
              if nc -z 127.0.0.1 8080; then
                echo "✅ Proxy is up!"
                break
              fi
              sleep 1
            done
          fi

      - name: Run Extension Script
        env:
          ACC: ${{ matrix.account_index == 'SINGLE' && secrets.EML || secrets[format('EML_{0}', matrix.account_index)] }}
          ACC_PWD: ${{ matrix.account_index == 'SINGLE' && secrets.PWD || secrets[format('PWD_{0}', matrix.account_index)] }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node renew.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.account_index }}
          path: "*.png"
          retention-days: 5

      - name: Persist status.json
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || echo "No remote changes"
          if [ -f status.json ]; then
            git add status.json
            git commit -m "chore: Update status.json for ${{ matrix.account_index }} [skip ci]" || echo "No changes"
            git push
          fi
